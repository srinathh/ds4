# DS4 Flash q2-imatrix + continuous-MTP on gx10. Built locally from this fork.
# Leak note: any teardown leaks unified memory on GB10 — recreate only via
# deploy.sh (down -> reboot -> up). Do not docker compose down without rebooting.
services:
  ds4:
    build: .
    image: ds4-flash:local
    container_name: ds4
    restart: unless-stopped  # auto-recover on boot (power outages recur; reboot reclaims the
                             # GB10 leak before restart). Don't change to always: an in-place
                             # crash restart against leaked memory needs the deploy.sh clean cycle.
    runtime: nvidia
    ipc: host
    shm_size: "1g"
    environment:
      - DS4_MTP_CONTINUOUS=1
      # DS4_MTP_SPEC_LOG=1 emits speculative-acceptance stats to stderr (used by the
      # /ds4-monitor tooling). Keep for monitoring, or drop for zero logging.
      - DS4_MTP_SPEC_LOG=1
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - /home/srinathh/ds4/gguf:/models:ro
      - /home/srinathh/ds4-kv:/kv     # persists across reboots; same engine sha
    command:
      - "-m"
      # Q2Q4 boosted model: layers 37-42 experts at Q4_K, other expert layers IQ2XXS gate/up +
      # Q2_K down. ~91 GiB (vs IQ2XXS 81 GiB). Testing without MTP first to gauge memory headroom.
      - "/models/DeepSeek-V4-Flash-Layers37-42Q4KExperts-OtherExpertLayersIQ2XXSGateUp-Q2KDown-AProjQ8-SExpQ8-OutQ8-chat-v2-imatrix-fixed.gguf"
      - "-c"
      - "204800"                       # 200K context
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--kv-disk-dir"
      - "/kv"
      - "--kv-disk-space-mb"
      - "262144"                       # 256 GB disk-KV budget (NVMe has ~650 GB free)
      # All KV chunk knobs at 4096 → cadence 4096 (keeper config from the interval/chunk study).
      - "--kv-cache-continued-interval-tokens"
      - "4096"
      - "--kv-cache-boundary-align-tokens"
      - "4096"
      - "--prefill-chunk"
      - "4096"
      - "--warm-weights"
      # MTP intentionally OMITTED for this build — Q2Q4 is +10 GiB vs IQ2XXS; first measure memory
      # headroom without the 3.6 GiB draft head, then decide if MTP fits. (Was: --mtp <MTP gguf>
      # --mtp-draft 2.)
      # NOTE: trace logging intentionally removed (was --trace /root/ds4-trace.txt
      # plus a ds4-trace.txt bind mount). Re-add only for debugging.
