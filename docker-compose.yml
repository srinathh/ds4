# DS4 Flash q2-imatrix + continuous-MTP on gx10. Built locally from this fork.
# Leak note: any teardown leaks unified memory on GB10 — recreate only via
# deploy.sh (down -> reboot -> up). Do not docker compose down without rebooting.
services:
  ds4:
    build: .
    image: ds4-flash:local
    container_name: ds4
    restart: "no"            # flip to unless-stopped only after a verified OpenClaw turn
    runtime: nvidia
    ipc: host
    shm_size: "1g"
    environment:
      - DS4_MTP_CONTINUOUS=1
      # DS4_MTP_SPEC_LOG=1 emits speculative-acceptance stats to stderr (used by the
      # /ds4-monitor tooling). Keep for monitoring, or drop for zero logging.
      - DS4_MTP_SPEC_LOG=1
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - /home/srinathh/ds4/gguf:/models:ro
      - /home/srinathh/ds4-kv:/kv     # persists across reboots; same engine sha
    command:
      - "-m"
      - "/models/DeepSeek-V4-Flash-IQ2XXS-w2Q2K-AProjQ8-SExpQ8-OutQ8-chat-v2-imatrix.gguf"
      - "-c"
      - "204800"                       # 200K context
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--kv-disk-dir"
      - "/kv"
      - "--kv-disk-space-mb"
      - "262144"                       # 256 GB disk-KV budget (NVMe has ~650 GB free)
      - "--kv-cache-continued-interval-tokens"
      - "8192"                         # rung densification: interval 8192 + align 4096 =
      - "--kv-cache-boundary-align-tokens"
      - "4096"                         #   step 8192 = 2 prefill chunks, every rung lands
      - "--warm-weights"
      # MTP (Multi-Token Prediction) speculative draft head — 3.6 GiB, Q4_K/Q8_0.
      - "--mtp"
      - "/models/DeepSeek-V4-Flash-MTP-Q4K-Q8_0-F32.gguf"
      - "--mtp-draft"
      - "2"
      # NOTE: trace logging intentionally removed (was --trace /root/ds4-trace.txt
      # plus a ds4-trace.txt bind mount). Re-add only for debugging.
